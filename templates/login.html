{% extends "layout.html" %}
{% block title %}Login - Equipe Zero22{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card animate-fade-in">
        <div class="login-header">
            <div class="logo">ZERO<span>22</span></div>
            <h2>Acesso <span>Restrito</span></h2>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="login-error"><i class="fas fa-exclamation-triangle"></i> {{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <form method="post" class="login-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Usuario" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn-neon btn-full">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        <p class="login-back"><a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Voltar ao site</a></p>
    </div>
</div>
{% endblock %}
